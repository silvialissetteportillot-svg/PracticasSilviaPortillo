<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Iphone</title>
</head>
<body>
    <h1>Registro para ganar un iphone 14 PRO MAX</h1>

    <form>
     <label for="Fname">Ingrese su nombre:</label> <br>
     <input type="text" name="Fname" id="Fname">
<br>
     <label for="Correo">Ingrese su correo:</label><br>
     <input type="email" name="Correo" id="Correo">

     <label for="clave">Contraseña</label>
     <input type="password" id="clave" name="clave">
     <p>¿ Vive en San Salvador?</p>

     <input type="radio" id="si" name="residencia">
     <label for="si">Si</label>

     <input type="radio" id="no" name="residencia">
     <label for="no">No</label> <br> <br>

     <label for="edad">Edad</label>
     <input type="number" id="edad" name="edad">

     <input type="submit" value="Registrarse">
     <input type="reset" value="Borrar">
    </form>
</body>
</html>
